<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yazar Paneli - Watch Me</title>
    <style>
        body { background: #141414; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 50px; }
        .panel { background: #1f1f1f; padding: 30px; border-radius: 10px; width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { color: #e50914; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #2b2b2b; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #e50914; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b20710; }
        .uyari { font-size: 12px; color: #888; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="panel">
    <h2>Yazar Paneli</h2>
    <p style="text-align: center; font-size: 14px;">Kitabınızı dünyayla paylaşın.</p>
    
    <input type="text" id="yazarAdi" placeholder="Adınız Soyadınız">
    <input type="text" id="kitapAdi" placeholder="Kitabın Adı">
    <input type="email" id="yazarEmail" placeholder="E-posta Adresiniz">
    <input type="text" id="videoLink" placeholder="YouTube Video Linki">
    <input type="text" id="kapakResmi" placeholder="Kapak Görseli Linki (Opsiyonel)">
    
    <button onclick="videoYukle()">Tanıtımı Yayınla</button>
    
    <div class="uyari">
        Yayınla butonuna bastığınızda videonuz ana sayfada listelenecektir.
    </div>
</div>

<script>
    async function videoYukle() {
        const veriler = {
            yazar: document.getElementById('yazarAdi').value,
            kitap: document.getElementById('kitapAdi').value,
            email: document.getElementById('yazarEmail').value,
            link: document.getElementById('videoLink').value,
            kapak: document.getElementById('kapakResmi').value
        };

        if (!veriler.yazar || !veriler.link || !veriler.email) {
            alert("Lütfen zorunlu alanları doldurun!");
            return;
        }

        try {
            const response = await fetch('/video-yukle', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(veriler)
            });

            if (response.ok) {
                alert("Tanıtım başarıyla sıraya alındı!");
                window.location.href = "index.html";
            } else {
                alert("Yükleme sırasında bir sorun oluştu.");
            }
        } catch (hata) {
            alert("Sunucu bağlantısı kurulamadı: " + hata.message);
        }
    }
</script>

</body>
</html>
